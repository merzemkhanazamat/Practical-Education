<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Кітапты өзгерту</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5" style="max-width: 500px;">
    <h2>Кітап мәліметтерін өзгерту</h2>
    <form method="POST" class="mt-4">
        <div class="mb-3">
            <label class="form-label">Кітап атауы:</label>
            <input type="text" name="title" class="form-control" value="{{ book.title }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Авторы:</label>
            <input type="text" name="author" class="form-control" value="{{ book.author }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Жанры:</label>
            <input type="text" name="genre" class="form-control" value="{{ book.genre }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Шыққан жылы:</label>
            <input type="number" name="published_year" class="form-control" value="{{ book.published_year }}">
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" name="is_available" class="form-check-input" id="avail" {% if book.is_available %}checked{% endif %}>
            <label class="form-check-label" for="avail">Кітапханада бар (Қолжетімді)</label>
        </div>
        <button type="submit" class="btn btn-primary">Жаңарту</button>
        <a href="/" class="btn btn-secondary">Артқа қайту</a>
    </form>
</body>
</html>
